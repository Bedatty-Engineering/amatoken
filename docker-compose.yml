services:
  amatoken:
    build: .
    container_name: amatoken
    # Run as the host user so we can read ~/.claude/projects (mode 700) and
    # write the SQLite volume. Override via UID/GID env vars if needed.
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8080:8080"
    environment:
      CLAUDE_PROJECTS_DIR: /claude-projects
      DB_PATH: /data/amatoken.db
      LISTEN_ADDR: ":8080"
      RECONCILE_INTERVAL: 60s
    volumes:
      - ${HOME}/.claude/projects:/claude-projects:ro
      - amatoken-db:/data
    restart: unless-stopped

volumes:
  amatoken-db:
