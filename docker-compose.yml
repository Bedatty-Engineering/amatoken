services:
  amatoken:
    build: .
    container_name: amatoken
    # Run as root so RTK can access its tracking database in the mounted volume.
    # RTK attempts to initialize its database with file permissions that require
    # root or the owning user; running as root ensures compatibility.
    user: "0:0"
    ports:
      - "${AMATOKEN_PORT:-2002}:2002"
    environment:
      CLAUDE_PROJECTS_DIR: /claude-projects
      DB_PATH: /data/amatoken.db
      LISTEN_ADDR: ":2002"
      RECONCILE_INTERVAL: 60s
      RTK_DB_PATH: /rtk-data/history.db
    volumes:
      - ${HOME}/.claude/projects:/claude-projects:ro
      - ${HOME}/.local/share/rtk:/rtk-data
      - amatoken-db:/data
    restart: unless-stopped

volumes:
  amatoken-db:
